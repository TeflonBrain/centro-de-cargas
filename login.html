<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Centro de Cargas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1a5fb4; --red: #d32f2f; --surface: #ffffff;
            --text: #2c2c3a; --text-muted: #6b7280;
            --border: #e2e4e9; --bg: #f0f2f5; --radius: 12px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100dvh; -webkit-font-smoothing: antialiased;
        }
        .page {
            min-height: 100dvh; display: flex;
            align-items: center; justify-content: center; padding: 1rem;
        }
        .login-card {
            width: 100%; max-width: 380px; background: var(--surface);
            border-radius: var(--radius);
            box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.08);
            padding: 2rem 1.5rem;
            animation: fadeUp .4s ease-out;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(16px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .login-card h1 {
            font-family: 'Space Mono', monospace;
            font-size: 1.3rem; color: var(--blue);
            text-align: center; margin-bottom: 1.5rem;
        }
        .field { margin-bottom: 1rem; }
        label {
            display: block; font-weight: 500; font-size: .82rem;
            color: var(--text-muted); text-transform: uppercase;
            letter-spacing: .04em; margin-bottom: .35rem;
        }
        input[type="email"], input[type="password"] {
            width: 100%; padding: .7rem .85rem;
            border: 1.5px solid var(--border); border-radius: 8px;
            font-family: inherit; font-size: .95rem;
            color: var(--text); background: #fafbfc;
            outline: none; transition: border-color .2s, box-shadow .2s;
        }
        input:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(26,95,180,.12);
            background: #fff;
        }
        .btn {
            width: 100%; padding: .8rem; border: none; border-radius: 8px;
            font-family: inherit; font-weight: 700; font-size: 1rem;
            cursor: pointer; background: var(--blue); color: #fff;
            box-shadow: 0 2px 8px rgba(26,95,180,.3);
            transition: background .2s, transform .1s;
            margin-top: .5rem;
        }
        .btn:hover { background: #164e9a; transform: translateY(-1px); }
        .error {
            background: #fef2f2; border: 1px solid #fecaca; color: var(--red);
            padding: .6rem .8rem; border-radius: 8px; font-size: .85rem;
            text-align: center; margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="login-card">
            <h1>&#128274; Admin</h1>
            %%ERROR_BLOCK%%
            <form method="POST" action="/admin/login">
                <div class="field">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" required autofocus>
                </div>
                <div class="field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button class="btn" type="submit">Iniciar sesión</button>
            </form>
        </div>
    </div>
</body>
</html>
