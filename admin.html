<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin — Centro de Cargas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,500;9..40,700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --blue: #1a5fb4; --surface: #ffffff; --text: #2c2c3a;
            --text-muted: #6b7280; --border: #e2e4e9;
            --bg: #f0f2f5; --radius: 12px;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100dvh; -webkit-font-smoothing: antialiased;
        }
        .page { padding: 1.5rem 1rem 3rem; max-width: 960px; margin: 0 auto; }
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 1.5rem; flex-wrap: wrap; gap: .75rem;
        }
        .top-bar h1 {
            font-family: 'Space Mono', monospace;
            font-size: clamp(1.1rem, 4vw, 1.5rem); color: var(--blue);
        }
        .badge {
            background: var(--blue); color: #fff;
            font-size: .75rem; font-weight: 700;
            padding: .25rem .6rem; border-radius: 20px;
        }
        .btn-sm {
            padding: .45rem .9rem; border: 1.5px solid var(--border);
            border-radius: 8px; background: var(--surface);
            font-family: inherit; font-size: .82rem; font-weight: 500;
            cursor: pointer; color: var(--text); transition: background .15s;
            text-decoration: none;
        }
        .btn-sm:hover { background: var(--bg); }
        .table-wrap {
            background: var(--surface); border-radius: var(--radius);
            box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.06);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; font-size: .88rem; }
        th {
            text-align: left; padding: .75rem 1rem;
            font-size: .72rem; text-transform: uppercase; letter-spacing: .05em;
            color: var(--text-muted); border-bottom: 2px solid var(--border);
            white-space: nowrap;
        }
        td {
            padding: .7rem 1rem; border-bottom: 1px solid var(--border);
            vertical-align: top;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8fafc; }
        .empty { text-align: center; padding: 2rem; color: var(--text-muted); }
        .nivel-tag {
            display: inline-block;
            font-size: .72rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .03em;
            padding: .2rem .55rem;
            border-radius: 6px;
            white-space: nowrap;
        }
        .nivel-sec { background: #dbeafe; color: #1e40af; }
        .nivel-bach { background: #dcfce7; color: #166534; }
        @media (max-width: 600px) {
            th, td { padding: .55rem .6rem; font-size: .82rem; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="top-bar">
            <div style="display:flex;align-items:center;gap:.6rem;">
                <h1>&#128203; Panel Admin</h1>
                <span class="badge">%%COUNT%% reportes</span>
            </div>
            <a href="/admin/logout" class="btn-sm">Cerrar sesión</a>
        </div>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Fecha / Hora</th><th>Nivel</th><th>Aula</th><th>Profesor(a)</th><th>Problema</th></tr>
                </thead>
                <tbody>%%ROWS%%</tbody>
            </table>
        </div>
    </div>
</body>
</html>
